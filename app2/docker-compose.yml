services:
  db:
    image: postgis/postgis:16-3.4
    container_name: kaohsiung-price-db
    environment:
      POSTGRES_USER: kaohsiung
      POSTGRES_PASSWORD: kaohsiung
      POSTGRES_DB: kaohsiung_price
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kaohsiung -d kaohsiung_price"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
